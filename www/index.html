<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
		<meta http-equiv="refresh" content="0; url=https://www.lapkart.store/" />
		<title>LapKart</title>
		<style>
			:root {
				color: #111111;
				background: #ffffff;
				font-family:
					Inter,
					system-ui,
					-apple-system,
					BlinkMacSystemFont,
					Segoe UI,
					sans-serif;
			}

			body {
				margin: 0;
				min-height: 100vh;
				display: grid;
				place-items: center;
				padding: 24px;
			}

			main {
				max-width: 320px;
				text-align: center;
			}

			.mark {
				width: 42px;
				height: 42px;
				margin: 0 auto 18px;
				border-radius: 12px;
				background: #fa5d19;
				box-shadow: 0 10px 30px rgba(250, 93, 25, 0.26);
			}

			p {
				margin: 0;
			}

			a {
				color: #fa5d19;
				font-weight: 650;
			}
		</style>
	</head>
	<body>
		<main>
			<div class="mark"></div>
			<p>Opening LapKart</p>
			<p style="margin-top: 8px; color: rgba(0, 0, 0, 0.56); font-size: 13px; line-height: 1.5">
				<a href="https://www.lapkart.store/">Continue to lapkart.store</a>
			</p>
		</main>
	</body>
</html>
