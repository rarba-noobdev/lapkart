<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta
			name="viewport"
			content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no"
		/>
		<title>LapKart</title>
		<style>
			:root {
				color-scheme: light;
				font-family:
					SuisseIntl,
					Suisse,
					Geist,
					-apple-system,
					BlinkMacSystemFont,
					'Segoe UI',
					sans-serif;
				background: #f9f9f9;
				color: #262626;
			}

			body {
				display: grid;
				min-height: 100dvh;
				margin: 0;
				place-items: center;
				padding: 24px;
			}

			main {
				max-width: 360px;
				border: 1px solid #e8e8e8;
				border-radius: 22px;
				background: #fff;
				padding: 24px;
				box-shadow: 0 24px 60px -42px rgba(0, 0, 0, 0.35);
			}

			.brand {
				display: inline-flex;
				align-items: baseline;
				gap: 2px;
				font-size: 26px;
				font-weight: 650;
				letter-spacing: -0.04em;
			}

			.brand span {
				color: #fa5d19;
			}

			p {
				margin: 16px 0 0;
				color: rgba(38, 38, 38, 0.64);
				line-height: 1.55;
			}
		</style>
	</head>
	<body>
		<main>
			<div class="brand">lap<span>kart</span></div>
			<p>
				LapKart is opening. If this screen stays visible, set `CAP_SERVER_URL` to your running
				SvelteKit app or deployed storefront before syncing Android.
			</p>
		</main>
	</body>
</html>
