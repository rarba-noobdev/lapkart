services:
  - type: web
    name: lapkart-api
    env: node
    plan: starter
    rootDir: api
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: WEB_ORIGIN
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false
      - key: SHIPROCKET_EMAIL
        sync: false
      - key: SHIPROCKET_PASSWORD
        sync: false
      - key: SHIPROCKET_PICKUP_LOCATION
        sync: false
      - key: SHIPROCKET_WEBHOOK_TOKEN
        sync: false
      - key: SHIPROCKET_BASE_URL
        value: https://apiv2.shiprocket.in/v1/external
      - key: SHIPROCKET_DEFAULT_WEIGHT_KG
        value: '0.5'
      - key: SHIPROCKET_DEFAULT_LENGTH_CM
        value: '20'
      - key: SHIPROCKET_DEFAULT_BREADTH_CM
        value: '15'
      - key: SHIPROCKET_DEFAULT_HEIGHT_CM
        value: '5'
      - key: LAPKART_DISPATCH_PINCODE
        sync: false
      - key: LAPKART_DISPATCH_LATITUDE
        sync: false
      - key: LAPKART_DISPATCH_LONGITUDE
        sync: false
      - key: OLA_MAPS_API_KEY
        sync: false
      - key: OLA_MAPS_CLIENT_ID
        sync: false
      - key: OLA_MAPS_CLIENT_SECRET
        sync: false
