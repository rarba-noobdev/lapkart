<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#1A1A1E"/>
      <stop offset="1" stop-color="#0B0B0D"/>
    </linearGradient>
    <linearGradient id="orange" x1="120" y1="120" x2="400" y2="400" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FF8A2B"/>
      <stop offset="1" stop-color="#FF6A00"/>
    </linearGradient>
  </defs>

  <!-- background -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <rect x="6" y="6" width="500" height="500" rx="108" fill="none" stroke="#FF6A00" stroke-opacity="0.10" stroke-width="2"/>

  <!-- mark: L formed by cart's left rail + base, with lightning bolt in basket negative space -->
  <g stroke="url(#orange)" stroke-width="26" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <!-- the L: vertical rail down + horizontal base (also the cart underside) -->
    <path d="M150 138 L150 326 L362 326"/>
    <!-- cart basket top edge -->
    <path d="M150 196 L378 196 L344 300 L186 300"/>
  </g>

  <!-- lightning bolt = "fast", solid orange, sits inside the basket -->
  <path d="M276 206 L226 262 L262 262 L246 306 L308 240 L270 240 Z" fill="url(#orange)"/>

  <!-- cart wheels -->
  <circle cx="196" cy="372" r="22" fill="url(#orange)"/>
  <circle cx="338" cy="372" r="22" fill="url(#orange)"/>
</svg>
